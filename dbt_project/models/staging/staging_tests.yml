version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved

  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: state
        data_tests:
          - not_null

  - name: stg_sellers
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique
      - name: state
        data_tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: stg_order_items
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: seller_id
        data_tests:
          - not_null

  - name: stg_order_payments
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: amount
        data_tests:
          - not_null
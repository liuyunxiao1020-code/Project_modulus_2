version: 2

models:
  - name: fact_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: customer_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: seller_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_key
      - name: item_price
        data_tests:
          - not_null
      - name: total_item_amount
        data_tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_key
        data_tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_key
        data_tests:
          - not_null
          - unique

  - name: dim_sellers
    columns:
      - name: seller_key
        data_tests:
          - not_null
          - unique

  - name: dim_time
    columns:
      - name: time_key
        data_tests:
          - not_null
          - unique

  - name: dim_payments
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: amount
        data_tests:
          - not_null